<svg width="900" height="90" viewBox="0 0 900 90" xmlns="http://www.w3.org/2000/svg">
  <style>
    .pincel {
      animation: mover 3s ease-in-out infinite alternate;
      transform-origin: center;
    }

    @keyframes mover {
      from {
        transform: translateX(90px);
      }
      to {
        transform: translateX(620px);
      }
    }

    .linea {
      stroke-dasharray: 620;
      stroke-dashoffset: 620;
      animation: dibujar 3s ease-in-out infinite alternate;
    }

    @keyframes dibujar {
      from {
        stroke-dashoffset: 620;
      }
      to {
        stroke-dashoffset: 0;
      }
    }
  </style>

  <path class="linea" d="M130 55 C260 45, 380 65, 520 52 C650 40, 740 55, 780 48" fill="none" stroke="#7B1E3A" stroke-width="8" stroke-linecap="round"></path>

  <g class="pincel">
    <rect x="60" y="35" width="95" height="14" rx="7" fill="#3b1f1f"></rect>
    <rect x="145" y="32" width="28" height="20" rx="4" fill="#c0c0c0"></rect>
    <path d="M170 31 L205 42 L170 55 Z" fill="#7B1E3A"></path>
    <circle cx="82" cy="42" r="4" fill="#ffffff" opacity="0.6"></circle>
  </g>
</svg>